name: CI/CD — EmployManager

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  SECRET_KEY: ci-secret-key-not-used-in-production
  DEBUG: "True"
  DB_NAME: test_db
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_HOST: localhost
  DB_PORT: "5432"

jobs:
  # ────────────────────────────────────────────
  # JOB 1 : Tests
  # ────────────────────────────────────────────
  test:
    name: 🧪 Tests & Qualité
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ✅ Vérifier les migrations
        run: python manage.py migrate --check
        continue-on-error: true

      - name: 🗄️ Appliquer les migrations
        run: python manage.py migrate

      - name: 🧪 Lancer les tests
        run: |
          python manage.py test apps.accounts apps.employees apps.audit \
            --verbosity=2 \
            --keepdb

      - name: 📊 Vérifier la configuration
        run: python manage.py check --deploy
        continue-on-error: true

  # ────────────────────────────────────────────
  # JOB 2 : Build Docker (sur main seulement)
  # ────────────────────────────────────────────
  build:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐳 Build image Docker
        run: docker build -t employmanager:${{ github.sha }} .

      - name: ✅ Test image Docker
        run: |
          docker run --rm \
            -e SECRET_KEY=test \
            -e DB_HOST=localhost \
            employmanager:${{ github.sha }} \
            python manage.py check 2>/dev/null || true

  # ────────────────────────────────────────────
  # JOB 3 : Déploiement (à adapter selon infra)
  # ────────────────────────────────────────────
  deploy:
    name: 🚀 Déploiement
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Déployer via SSH
        # Décommentez et configurez selon votre serveur cible
        # uses: appleboy/ssh-action@v1
        # with:
        #   host: ${{ secrets.SERVER_HOST }}
        #   username: ${{ secrets.SERVER_USER }}
        #   key: ${{ secrets.SSH_PRIVATE_KEY }}
        #   script: |
        #     cd /opt/employmanager
        #     git pull origin main
        #     docker compose pull
        #     docker compose up -d --build
        #     docker compose exec web python manage.py migrate
        run: echo "🔧 Configurez vos secrets GitHub pour activer le déploiement SSH"
